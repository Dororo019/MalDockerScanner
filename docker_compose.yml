version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: maldocker_db
    restart: always
    environment:
      POSTGRES_DB: docker_security
      POSTGRES_USER: docker_security_logs
      POSTGRES_PASSWORD: ${DB_PASSWORD:-malDocker2024!Secure}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker_security_logs -d docker_security"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maldocker_network

 
  app:
    build: .
    container_name: maldocker_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: docker_security
      DB_USER: docker_security_logs
      DB_PASSWORD: ${DB_PASSWORD:-malDocker2024!Secure}
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  #this is for scanning Docker images
      - ./output:/app/output
      - ./logs:/app/logs
      - ./models:/app/models
      - ./malware_rules.yar:/app/malware_rules.yar
    networks:
      - maldocker_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: maldocker_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@maldocker.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-iamadmin26}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - maldocker_network
    profiles:
      - dev #remember to run only on dev profiles

volumes:
  postgres_data:
    driver: local

networks:
  maldocker_network:
    driver: bridge
