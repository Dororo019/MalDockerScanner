# render.yaml
# ════════════════════════════════════════════════════════════════════
# MalDocker Scanner — Free Cloud Deployment on Render.com
# ════════════════════════════════════════════════════════════════════
#
# WHAT THIS GIVES YOU:
#   • Flask server running 24/7 at https://maldocker.onrender.com
#   • PostgreSQL database (free tier — 1 GB)
#   • GitHub Pages hosts the standalone HTML (public URL)
#   • Total cost: FREE
#
# SETUP STEPS:
#   1. Push this file to your GitHub repo root
#   2. Go to render.com → New → Blueprint → connect your GitHub repo
#   3. Render reads this file and creates both services automatically
#   4. Set environment variables in Render dashboard (see below)
#
# LIMITATIONS OF FREE TIER:
#   • Server sleeps after 15 min of no requests (wakes in ~30 seconds)
#   • 512 MB RAM — enough for Flask + mock scans, tight for real ClamAV
#   • No Docker daemon — real scans need the VM approach
#   • Free PostgreSQL expires after 90 days (upgrade or re-create)
#
# ════════════════════════════════════════════════════════════════════

services:
  # ── Flask Web Server ────────────────────────────────────────────
  - type: web
    name: maldocker-scanner
    runtime: python
    region: oregon
    plan: free
    repo: https://github.com/doro019/malicious-docker-images-scanner

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      python app/quick_dashboard.py --port $PORT

    envVars:
      - key: PORT
        value: 10000

      # PostgreSQL connection — Render injects DATABASE_URL automatically
      # when you link the database service below
      - key: DATABASE_URL
        fromDatabase:
          name: maldocker-db
          property: connectionString

      # Set to 'true' to use real scanner (only works if Docker is available)
      - key: USE_REAL_SCANNER
        value: "false"

      # Allow your GitHub Pages URL to call this server (CORS)
      - key: ALLOWED_ORIGIN
        value: "https://doro019.github.io"

    healthCheckPath: /health

  # ── PostgreSQL Database ─────────────────────────────────────────
databases:
  - name: maldocker-db
    databaseName: docker_security_db
    user: docker_security_logs
    plan: free
    region: oregon
